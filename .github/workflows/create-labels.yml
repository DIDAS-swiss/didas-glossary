name: Create glossary labels

on:
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create tier and admin labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'tier-1-adopt',  color: '2ea44f', description: 'Term adopted as-is from ToIP (tref)' },
              { name: 'tier-2-extend', color: 'd4ac0d', description: 'Local definition extending a ToIP anchor (xref)' },
              { name: 'tier-3-own',    color: 'd73a4a', description: 'Fully independent DIDAS definition' },
              { name: 'admin',         color: 'c5def5', description: 'Repository or org administration task' },
              { name: 'glossary',      color: '0075ca', description: 'Glossary content change' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  core.info(`Already exists: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }
